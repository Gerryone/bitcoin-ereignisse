name: Bitcoin Ereignisse Update

on:
  schedule:
    # Täglich um 07:00 UTC (09:00 MESZ / 08:00 MEZ)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Manuell auslösbar über GitHub UI (Actions → Run workflow)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Nötig für git push

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install anthropic requests

      - name: Bitcoin-Ereignisse aktualisieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_bitcoin.py

      - name: Änderungen committen und pushen
        run: |
          git config user.name "Bitcoin-Bot"
          git config user.email "bitcoin-bot@github.com"
          git add ereignisse.json
          if git diff --staged --quiet; then
            echo "Keine Änderungen – nichts zu committen."
          else
            git commit -m "Update: Bitcoin-Ereignisse $(date +%Y-%m-%d)"
            git push
            echo "✓ Erfolgreich gepusht."
          fi
